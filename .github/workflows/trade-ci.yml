# .github\workflows\trade-ci.yml
name: Trade Frontend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests with Coverage (Vitest)
        run: npx vitest run --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONARACCESSTOKEN }}
        with:
          args: >
            -Dsonar.organization=wissal2023
            -Dsonar.projectKey=wissal2023_DevOps_test
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-build
          path: dist